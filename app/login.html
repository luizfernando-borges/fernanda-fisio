<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Área do Paciente — Dra. Fernanda Rodrigues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --w50:#FAF8F4;--w100:#F0E9DC;--w200:#DDD0BC;
      --w400:#C4956A;--w600:#9B7146;--w800:#6B4F2E;
      --g50:#F8F9FA;--g200:#E8EAED;--g400:#9AA0A6;--g600:#5F6368;--g900:#202124;
      --white:#fff;--radius:10px;--shadow:0 4px 24px rgba(0,0,0,0.10);
    }
    body{font-family:'Inter',sans-serif;background:var(--w50);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--white);border-radius:16px;box-shadow:var(--shadow);padding:40px;width:100%;max-width:400px}
    .logo{text-align:center;margin-bottom:32px}
    .logo-initials{width:60px;height:60px;border-radius:50%;background:var(--w100);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--w800);margin:0 auto 14px}
    .logo h1{font-size:17px;font-weight:600;color:var(--g900)}
    .logo p{font-size:13px;color:var(--g400);margin-top:4px}
    .form-group{margin-bottom:18px}
    label{display:block;font-size:13px;font-weight:500;color:var(--g600);margin-bottom:6px}
    input{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:var(--radius);font-size:14px;font-family:'Inter',sans-serif;color:var(--g900);background:var(--white);transition:border-color .15s,box-shadow .15s;outline:none}
    input:focus{border-color:var(--w400);box-shadow:0 0 0 3px rgba(196,149,106,.15)}
    .btn{width:100%;padding:13px;background:var(--w400);color:var(--white);border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background .15s;margin-top:6px}
    .btn:hover{background:var(--w600)}
    .btn:disabled{background:var(--w200);cursor:not-allowed}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--g400);font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--g200)}
    .btn-ghost{width:100%;padding:12px;background:var(--white);color:var(--g600);border:1.5px solid var(--g200);border-radius:var(--radius);font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
    .btn-ghost:hover{border-color:var(--w400);color:var(--w600)}
    .error{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#B91C1C;margin-bottom:16px;display:none}
    .error.show{display:block}
    .loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back{text-align:center;margin-top:20px}
    .back a{font-size:13px;color:var(--g400);text-decoration:none}
    .back a:hover{color:var(--w600)}
    .tab-row{display:flex;gap:0;border:1.5px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:28px}
    .tab-btn{flex:1;padding:10px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;border:none;background:var(--white);color:var(--g400);cursor:pointer;transition:all .15s}
    .tab-btn.active{background:var(--w400);color:var(--white)}
    .forgot{font-size:12px;color:var(--g400);text-align:right;margin-top:-12px;margin-bottom:16px}
    .forgot a{color:var(--w600);text-decoration:none}
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-initials">FR</div>
    <h1>Dra. Fernanda Rodrigues</h1>
    <p>Área exclusiva · Pacientes e profissional</p>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="setTab('login')">Entrar</button>
    <button class="tab-btn" onclick="setTab('reset')">Esqueci a senha</button>
  </div>

  <div id="error-msg" class="error"></div>

  <!-- LOGIN FORM -->
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
    </div>
    <div class="forgot"><a href="#" onclick="setTab('reset'); return false;">Esqueceu a senha?</a></div>
    <button type="submit" class="btn" id="login-btn">Entrar</button>
  </form>

  <!-- RESET FORM -->
  <form id="reset-form" onsubmit="doReset(event)" style="display:none">
    <p style="font-size:14px;color:var(--g600);margin-bottom:20px;line-height:1.6">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="reset-email" placeholder="seu@email.com" required/>
    </div>
    <button type="submit" class="btn" id="reset-btn">Enviar link</button>
    <div class="divider">ou</div>
    <button type="button" class="btn-ghost" onclick="setTab('login')">Voltar para o login</button>
  </form>
</div>

<div class="back"><a href="../index.html">← Voltar ao site</a></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  function setTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'?0:1)===i));
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('reset-form').style.display = tab === 'reset' ? 'block' : 'none';
    showError('');
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.toggle('show', !!msg);
  }

  function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="loading"></span>${text}` : text;
  }

  async function doLogin(e) {
    e.preventDefault();
    showError('');
    setLoading('login-btn', true, 'Entrando...');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      showError('E-mail ou senha incorretos. Tente novamente.');
      setLoading('login-btn', false, 'Entrar');
      return;
    }

    // Redireciona por tipo de usuário
    if (email === ADMIN_EMAIL) {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'paciente.html';
    }
  }

  async function doReset(e) {
    e.preventDefault();
    showError('');
    setLoading('reset-btn', true, 'Enviando...');

    const email = document.getElementById('reset-email').value.trim();
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/app/login.html'
    });

    setLoading('reset-btn', false, 'Enviar link');
    if (error) {
      showError('Erro ao enviar e-mail. Verifique o endereço.');
    } else {
      showError('');
      document.getElementById('reset-form').innerHTML = `
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:32px;margin-bottom:12px">✉️</div>
          <p style="font-size:15px;font-weight:600;color:var(--g900);margin-bottom:8px">E-mail enviado!</p>
          <p style="font-size:13px;color:var(--g400)">Verifique sua caixa de entrada e clique no link para redefinir sua senha.</p>
          <button type="button" class="btn-ghost" style="margin-top:20px" onclick="setTab('login')">Voltar para o login</button>
        </div>
      `;
    }
  }

  // Se já está logado, redireciona direto
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      const email = session.user.email;
      window.location.href = email === ADMIN_EMAIL ? 'admin.html' : 'paciente.html';
    }
  });
</script>
</body>
</html>
